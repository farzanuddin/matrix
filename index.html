<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Matrix</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="stylesheet" href="/src/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
  </head>
  <body>
    <div class="board-wrapper">
      <div class="board-row">
        <button id="reset" aria-label="Reset">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--border)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>
        </button>
        <div class="board-col">
          <div class="board" id="board"></div>
          <div class="toolbar">
            <div class="hints">
              <span class="hint" title="Arrow keys to move">
                <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="var(--border)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="3" y="3" width="18" height="18" rx="4" />
                  <polyline points="12 15 12 9 9 12" />
                  <polyline points="12 9 15 12" />
                </svg>
              </span>
              <span class="hint-plus">+</span>
              <span class="hint" title="Space to mark">
                <svg viewBox="0 0 56 24" width="56" height="24" fill="none" stroke="var(--border)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="3" y="3" width="50" height="18" rx="4" />
                  <path d="M12 11 v1 a1 1 0 0 0 1 1 h30 a1 1 0 0 0 1 -1 v-1" />
                </svg>
              </span>
              <span class="hint-label"><strong>arrow keys</strong> to move &middot; <strong>space</strong> to mark</span>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/script.js"></script>
  </body>
</html>
